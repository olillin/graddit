<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GräddIT</title>
    <meta name="description" content="Miniräknare för hur du gör turkos grädde som P.R.I.T.">
    <meta name="keywords" content="grädde chalmers.it it chalmers">
    <link rel="stylesheet" href="/style.css">
    <script src="/app.js" defer></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>

<body>
    <main>
        <header>
            <h1>GräddIT</h1>
            <p class="tagline"><span>hur du gör turkos grädde som P<span class="dark">.</span>R<span
                          class="dark">.</span>I<span class="dark">.</span>T<span class="dark">.</span></span></p>
        </header>
        <div class="ingredients">
            <label class="ingredient" for="cream">Grädde</label>
            <input type="number" name="cream" id="cream" value="1">
            <span class="unit">l</span>

            <label class="ingredient" for="blue">Blå karamellfärg</label>
            <input type="number" name="blue" id="blue" value="1">
            <span class="unit">ml</span>

            <label class="ingredient" for="green">Grön karamellfärg</label>
            <input type="number" name="green" id="green" value="1">
            <span class="unit">ml</span>
        </div>

        <span class="extra">En gräddsifon fylls med 1 liter grädde.</span>
    </main>
    <div class="background">
        <div class="gradient"></div>
    </div>
</body>

</html>
