<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GräddIT</title>
    <meta name="description" content="Miniräknare för att göra P.R.I.T.s turkosa grädde">
    <meta name="keywords" content="grädde chalmers.it it chalmers">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto+Serif:ital,opsz@0,8..144;1,8..144&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Serif:ital,opsz@0,8..144;1,8..144&display=swap"></noscript>
    <link rel="preload" href="zyzol.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="zyzol.css"></noscript>
    <link rel="stylesheet" href="/style.css">
    <script src="/app.js" defer></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>

<body>
    <main>
        <h1>GräddIT</h1>
        <p class="tagline">
            <span>gör turkos grädde som P.&nbsp;R.&nbsp;I.&nbsp;T.</span>
        </p>

        <div class="ingredients">
            <label class="ingredient" for="cream">Grädde</label>
            <input type="number" name="cream" id="cream" value="1">
            <span class="unit">liter</span>

            <label class="ingredient" for="blue">Blå karamellfärg</label>
            <input type="number" name="blue" id="blue" value="1">
            <span class="unit">ml</span>

            <label class="ingredient" for="green">Grön karamellfärg</label>
            <input type="number" name="green" id="green" value="1">
            <span class="unit">ml</span>
        </div>

        <span class="extra">En gräddsifon fylls med 1 liter grädde.</span>
    </main>

    <footer>
        <span class="footer-arrow"></span>

        <span>
            Made with <span class="pixelnheart"></span> by
            <a href="https://github.com/olillin" target="_blank">Cal</a>
        </span>
        <a href="https://github.com/cthit/graddit" target="_blank">View source code on GitHub</a>
    </footer>

    <div class="background">
        <div class="gradient"></div>
    </div>
</body>

</html>
